<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>拼图游戏</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f6f7f9;
  color: #222;
  text-align: center;
}

main {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  font-size: 30px;
  margin: 12px 0 18px;
}

.controls,
.info {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

button {
  padding: 9px 14px;
  font-size: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

.puzzle-wrap {
  position: relative;
  width: min(90vw, 540px);
  height: min(90vw, 540px);
  margin: 0 auto;
}

.puzzle {
  width: 100%;
  height: 100%;
  display: grid;
  gap: 2px;
  background: #ddd;
  border: 3px solid #ddd;
  border-radius: 14px;
  overflow: hidden;
  touch-action: manipulation;
}

.tile {
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s, outline 0.15s;
}

.tile.selected {
  outline: 4px solid #ff9800;
  transform: scale(0.94);
  z-index: 2;
}

.watermark {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  pointer-events: none;

  font-size: clamp(38px, 12vw, 92px);
  font-weight: 900;

  color: rgba(255,255,255,0.55);

  text-shadow:
    0 3px 12px rgba(0,0,0,0.4);

  letter-spacing: 2px;
}

.watermark.show {
  display: flex;
}

#message {
  margin-top: 16px;
  min-height: 30px;
  font-size: 18px;
  font-weight: bold;
}

.follow-box {
  display: none;
  margin: 16px auto 0;
  padding: 16px;
  max-width: 540px;
  border-radius: 14px;
  background: #eef8f1;
  border: 1px solid #b9e6c8;
}

.follow-box.show {
  display: block;
}

.follow-box a {
  color: #0f7a3b;
  font-weight: bold;
  text-decoration: none;
}

.levels {
  margin-top: 24px;
}

.level-title {
  font-weight: bold;
  margin-bottom: 12px;
}

.level-buttons {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
}

.level-btn {
  height: 54px;
  border-radius: 12px;
  border: 1px solid #ccc;
  background: white;
  font-size: 18px;
  font-weight: bold;
}

.level-btn.active {
  border-color: #2ecc71;
  background: #eafff1;
}

.level-btn.locked {
  opacity: 0.45;
  cursor: not-allowed;
}

.hint {
  margin-top: 16px;
  font-size: 13px;
  color: #666;
}

@media (max-width: 520px) {
  .level-buttons {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>

<body>

<main>

  <h1>🧩 拼图游戏 🧩</h1>

  <div class="controls">
    <button id="restartBtn">重新开始</button>
    <button id="shareBtn">复制链接</button>
  </div>

  <div class="info">
    <span>关卡：<b id="stageText">1 / 6</b></span>
    <span>难度：<b id="difficultyText">2 × 2</b></span>
    <span>步数：<b id="moves">0</b></span>
    <span>时间：<b id="timer">0</b> 秒</span>
  </div>

  <div class="puzzle-wrap">
    <div id="puzzle" class="puzzle"></div>

    <div id="watermark" class="watermark">
      misokuro14
    </div>
  </div>

  <p id="message"></p>

  <div id="followBox" class="follow-box">
    🎉 通关成功！欢迎关注我的 X：<br><br>

    <a
      href="https://x.com/misokuro14"
      target="_blank"
    >
      @misokuro14
    </a>
  </div>

  <section class="levels">
    <div class="level-title">
      选择关卡
    </div>

    <div id="levelButtons" class="level-buttons"></div>
  </section>

  <p class="hint">
    提示：点击两块拼图即可交换位置。<br>
    每关完成后会自动出现水印。
  </p>

</main>

<script>

const puzzle = document.getElementById("puzzle");
const restartBtn = document.getElementById("restartBtn");
const shareBtn = document.getElementById("shareBtn");

const movesEl = document.getElementById("moves");
const timerEl = document.getElementById("timer");

const messageEl = document.getElementById("message");

const watermarkEl = document.getElementById("watermark");

const followBox = document.getElementById("followBox");

const stageText = document.getElementById("stageText");

const difficultyText = document.getElementById("difficultyText");

const levelButtons = document.getElementById("levelButtons");

const TOTAL_STAGES = 6;

const WATERMARK_TEXT = "misokuro14";

const stages = [

  {
    stage: 1,
    size: 2,
    image: "assets/stage1.jpg"
  },

  {
    stage: 2,
    size: 3,
    image: "assets/stage2.jpg"
  },

  {
    stage: 3,
    size: 3,
    image: "assets/stage3.jpg"
  },

  {
    stage: 4,
    size: 4,
    image: "assets/stage4.jpg"
  },

  {
    stage: 5,
    size: 4,
    image: "assets/stage5.jpg"
  },

  {
    stage: 6,
    size: 5,
    image: "assets/stage6.jpg"
  }

];

let currentStage = 1;

let unlockedStage =
  Number(localStorage.getItem("unlockedStage")) || 1;

let size = 2;

let imageUrl = "";

let tiles = [];

let selectedTile = null;

let moves = 0;

let seconds = 0;

let timer = null;

let gameStarted = false;

let finished = false;

function getStageFromUrl() {

  const params =
    new URLSearchParams(window.location.search);

  const urlStage =
    Number(params.get("stage"));

  currentStage =
    urlStage >= 1 &&
    urlStage <= TOTAL_STAGES
      ? urlStage
      : 1;

  if (currentStage > unlockedStage) {
    currentStage = unlockedStage;
  }

}

function updateUrl() {

  const url =
    new URL(window.location.href);

  url.searchParams.set(
    "stage",
    currentStage
  );

  window.history.replaceState(
    {},
    "",
    url
  );

}

function initGame() {

  getStageFromUrl();

  updateUrl();

  const config =
    stages[currentStage - 1];

  size = config.size;

  imageUrl = config.image;

  stageText.textContent =
    `${currentStage} / ${TOTAL_STAGES}`;

  difficultyText.textContent =
    `${size} × ${size}`;

  tiles = [];

  selectedTile = null;

  moves = 0;

  seconds = 0;

  gameStarted = false;

  finished = false;

  clearInterval(timer);

  movesEl.textContent = moves;

  timerEl.textContent = seconds;

  messageEl.textContent = "";

  followBox.classList.remove("show");

  watermarkEl.classList.remove("show");

  watermarkEl.textContent =
    WATERMARK_TEXT;

  createTiles();

  shuffleTiles();

  renderTiles();

  renderStageButtons();

}

function createTiles() {

  const total =
    size * size;

  tiles =
    Array.from(
      { length: total },
      (_, index) => ({
        id: index
      })
    );

}

function shuffleTiles() {

  for (
    let i = tiles.length - 1;
    i > 0;
    i--
  ) {

    const j =
      Math.floor(
        Math.random() * (i + 1)
      );

    [
      tiles[i],
      tiles[j]
    ] = [
      tiles[j],
      tiles[i]
    ];

  }

  if (isSolved()) {
    shuffleTiles();
  }

}

function renderTiles() {

  puzzle.innerHTML = "";

  puzzle.style.gridTemplateColumns =
    `repeat(${size}, 1fr)`;

  puzzle.style.gridTemplateRows =
    `repeat(${size}, 1fr)`;

  tiles.forEach((tile, index) => {

    const div =
      document.createElement("div");

    div.className = "tile";

    const row =
      Math.floor(tile.id / size);

    const col =
      tile.id % size;

    div.style.backgroundImage =
      `url("${imageUrl}")`;

    div.style.backgroundSize =
      `${size * 100}% ${size * 100}%`;

    div.style.backgroundPosition =
      `${(col / (size - 1)) * 100}% ${(row / (size - 1)) * 100}%`;

    div.addEventListener(
      "click",
      () => handleTileClick(index)
    );

    puzzle.appendChild(div);

  });

}

function handleTileClick(index) {

  if (finished) return;

  if (!gameStarted) {

    startTimer();

    gameStarted = true;

  }

  const tileElements =
    document.querySelectorAll(".tile");

  if (selectedTile === null) {

    selectedTile = index;

    tileElements[index]
      .classList.add("selected");

    return;

  }

  if (selectedTile === index) {

    tileElements[index]
      .classList.remove("selected");

    selectedTile = null;

    return;

  }

  [
    tiles[selectedTile],
    tiles[index]
  ] = [
    tiles[index],
    tiles[selectedTile]
  ];

  selectedTile = null;

  moves++;

  movesEl.textContent = moves;

  renderTiles();

  if (isSolved()) {

    finishGame();

  }

}

function isSolved() {

  return tiles.every(
    (tile, index) =>
      tile.id === index
  );

}

function startTimer() {

  timer = setInterval(() => {

    seconds++;

    timerEl.textContent = seconds;

  }, 1000);

}

function finishGame() {

  finished = true;

  clearInterval(timer);

  watermarkEl.classList.add("show");

  followBox.classList.add("show");

  if (
    currentStage === unlockedStage &&
    unlockedStage < TOTAL_STAGES
  ) {

    unlockedStage++;

    localStorage.setItem(
      "unlockedStage",
      unlockedStage
    );

  }

  if (currentStage === TOTAL_STAGES) {

    messageEl.textContent =
      `🎉 全部通关！感谢游玩！`;

  } else {

    messageEl.textContent =
      `完成！已解锁第 ${unlockedStage} 关！`;

  }

  renderStageButtons();

}

function renderStageButtons() {

  levelButtons.innerHTML = "";

  for (
    let i = 1;
    i <= TOTAL_STAGES;
    i++
  ) {

    const btn =
      document.createElement("button");

    btn.className = "level-btn";

    if (i === currentStage) {

      btn.classList.add("active");

    }

    if (i > unlockedStage) {

      btn.classList.add("locked");

      btn.textContent =
        `${i} 🔒`;

    } else {

      btn.textContent = i;

    }

    btn.addEventListener(
      "click",
      () => {

        if (i > unlockedStage) return;

        currentStage = i;

        updateUrl();

        initGame();

      }
    );

    levelButtons.appendChild(btn);

  }

}

restartBtn.addEventListener(
  "click",
  initGame
);

shareBtn.addEventListener(
  "click",
  async () => {

    updateUrl();

    const shareUrl =
      window.location.href;

    try {

      await navigator.clipboard.writeText(
        shareUrl
      );

      messageEl.textContent =
        "链接已复制！";

    } catch {

      messageEl.textContent =
        shareUrl;

    }

  }
);

initGame();

</script>

</body>
</html>
