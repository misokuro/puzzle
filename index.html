<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>拼图游戏</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #f7f7f7, #eaeaea);
  color: #222;
  text-align: center;
}

main {
  max-width: 560px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  font-size: 28px;
  margin: 12px 0 16px;
}

.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

button, select {
  padding: 9px 13px;
  font-size: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
  background: white;
}

button {
  cursor: pointer;
}

.info {
  display: flex;
  justify-content: center;
  gap: 22px;
  margin: 12px 0;
}

.puzzle {
  width: min(90vw, 500px);
  height: min(90vw, 500px);
  margin: 0 auto;
  display: grid;
  gap: 2px;
  background: #ddd;
  border: 3px solid #ddd;
  border-radius: 12px;
  overflow: hidden;
  touch-action: manipulation;
}

.tile {
  background-image: url("assets/puzzle.jpg");
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s, outline 0.15s;
}

.tile.selected {
  outline: 4px solid #ff9800;
  transform: scale(0.94);
  z-index: 2;
}

#message {
  margin-top: 16px;
  min-height: 28px;
  font-size: 18px;
  font-weight: bold;
}

.hint {
  margin-top: 10px;
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body>
<main>
  <h1>拼图游戏</h1>

  <div class="controls">
    <label>
      难度：
      <select id="levelSelect">
        <option value="3">3 × 3</option>
        <option value="4">4 × 4</option>
        <option value="5">5 × 5</option>
      </select>
    </label>

    <button id="restartBtn">重新开始</button>
    <button id="shareBtn">复制分享链接</button>
  </div>

  <div class="info">
    <span>步数：<b id="moves">0</b></span>
    <span>时间：<b id="timer">0</b> 秒</span>
  </div>

  <div id="puzzle" class="puzzle"></div>

  <p id="message"></p>
  <p class="hint">点击两块拼图即可交换位置。手机也可以直接点击操作。</p>
</main>

<script>
const puzzle = document.getElementById("puzzle");
const levelSelect = document.getElementById("levelSelect");
const restartBtn = document.getElementById("restartBtn");
const shareBtn = document.getElementById("shareBtn");
const movesEl = document.getElementById("moves");
const timerEl = document.getElementById("timer");
const messageEl = document.getElementById("message");

let level = 3;
let tiles = [];
let selectedTile = null;
let moves = 0;
let seconds = 0;
let timer = null;
let gameStarted = false;
let finished = false;

function getLevelFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const value = Number(params.get("level"));
  return [3, 4, 5].includes(value) ? value : 3;
}

function initGame() {
  level = getLevelFromUrl();
  levelSelect.value = level;

  tiles = [];
  selectedTile = null;
  moves = 0;
  seconds = 0;
  gameStarted = false;
  finished = false;

  clearInterval(timer);
  movesEl.textContent = moves;
  timerEl.textContent = seconds;
  messageEl.textContent = "";

  createTiles();
  shuffleTiles();
  renderTiles();
}

function createTiles() {
  const total = level * level;

  tiles = Array.from({ length: total }, (_, index) => ({
    id: index
  }));
}

function shuffleTiles() {
  for (let i = tiles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }

  if (isSolved()) {
    shuffleTiles();
  }
}

function renderTiles() {
  puzzle.innerHTML = "";
  puzzle.style.gridTemplateColumns = `repeat(${level}, 1fr)`;
  puzzle.style.gridTemplateRows = `repeat(${level}, 1fr)`;

  tiles.forEach((tile, index) => {
    const div = document.createElement("div");
    div.className = "tile";

    const row = Math.floor(tile.id / level);
    const col = tile.id % level;

    div.style.backgroundSize = `${level * 100}% ${level * 100}%`;
    div.style.backgroundPosition = `${(col / (level - 1)) * 100}% ${(row / (level - 1)) * 100}%`;

    div.addEventListener("click", () => handleTileClick(index));

    puzzle.appendChild(div);
  });
}

function handleTileClick(index) {
  if (finished) return;

  if (!gameStarted) {
    startTimer();
    gameStarted = true;
  }

  const tileElements = document.querySelectorAll(".tile");

  if (selectedTile === null) {
    selectedTile = index;
    tileElements[index].classList.add("selected");
    return;
  }

  if (selectedTile === index) {
    tileElements[index].classList.remove("selected");
    selectedTile = null;
    return;
  }

  [tiles[selectedTile], tiles[index]] = [tiles[index], tiles[selectedTile]];

  selectedTile = null;
  moves++;
  movesEl.textContent = moves;

  renderTiles();

  if (isSolved()) {
    finishGame();
  }
}

function isSolved() {
  return tiles.every((tile, index) => tile.id === index);
}

function startTimer() {
  timer = setInterval(() => {
    seconds++;
    timerEl.textContent = seconds;
  }, 1000);
}

function finishGame() {
  finished = true;
  clearInterval(timer);
  messageEl.textContent = `完成！你用了 ${moves} 步，${seconds} 秒。`;
}

function updateUrlLevel(newLevel) {
  const url = new URL(window.location.href);
  url.searchParams.set("level", newLevel);
  window.history.replaceState({}, "", url);
}

levelSelect.addEventListener("change", () => {
  updateUrlLevel(levelSelect.value);
  initGame();
});

restartBtn.addEventListener("click", initGame);

shareBtn.addEventListener("click", async () => {
  const shareUrl = window.location.href;

  try {
    await navigator.clipboard.writeText(shareUrl);
    messageEl.textContent = "分享链接已复制！";
  } catch {
    messageEl.textContent = shareUrl;
  }
});

initGame();
</script>
</body>
</html>
